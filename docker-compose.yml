services:
  app:
    build:
      context: .
      dockerfile: infra/Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_CHANNEL: stderr
      DB_DATABASE: /data/database.sqlite
      SESSION_DRIVER: array
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
    volumes:
      - sqlite:/data

  web:
    build:
      context: .
      dockerfile: infra/web.Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://app:8080
    volumes:
      - ./apps/web:/web
      - web_node_modules:/web/node_modules
    depends_on:
      - app

volumes:
  sqlite:
  web_node_modules:
