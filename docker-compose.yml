services:
  app:
    build:
      context: .
      dockerfile: infra/Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_CHANNEL: stderr
      DB_DATABASE: /data/database.sqlite
      SESSION_DRIVER: array
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
    volumes:
      - sqlite:/data

volumes:
  sqlite:
