name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API · test · stan · lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: cp .env.example .env && php artisan key:generate
      - run: touch database/database.sqlite && php artisan migrate --force
      - run: composer lint
      - run: composer stan
      - run: composer test

  web:
    name: Web · vitest · build · e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: apps/web/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  image:
    name: Image · build · smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build the production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          tags: cl-sim:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Boot and smoke-test the artifact
        run: |
          docker run -d --name cl -p 8080:8080 \
            -e APP_ENV=testing \
            -e DB_DATABASE=/data/database.sqlite \
            cl-sim:ci
          # Wait on the image's own HEALTHCHECK rather than a blind sleep.
          for i in $(seq 1 30); do
            [ "$(docker inspect -f '{{.State.Health.Status}}' cl)" = healthy ] && break
            sleep 2
          done
          ./infra/smoke.sh http://localhost:8080
      - if: always()
        run: docker logs cl 2>&1 | tail -50 || true

  deploy:
    name: Deploy to Fly
    needs: [api, web, image]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
